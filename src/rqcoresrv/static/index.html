    <style>
        #favicon-title {
            width: 32px;
            height: 32px;
            vertical-align: text-top;
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .dashboard-col {
            flex: 1 1 250px;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 12px;
            padding: 16px;
            box-shadow:
                0 6px 14px rgba(0, 0, 0, 0.12),
                0 2px 6px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .dashboard-col h3 {
            margin: 0 0 14px 0;
            padding: 10px 12px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3080c7, #5b9dd7);
            color: #ffffff;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .dashboard-item {
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 8px;
            text-align: left;
            background-color: #e6f0ff;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .dashboard-item:nth-child(even) {
            background-color: #e3f2e1;
        }

        .dashboard-item:hover {
            background-color: #FFA500;
            transform: translateX(4px);
        }

        .img-common, .dashboard-item svg {
            width: 24px;
            height: 24px;
            object-fit: contain;
            vertical-align: middle;
            margin-right: 2px;
        }

        .dashboard-item svg {
            margin: 0px;
        }

        a {
            color: #1f4e79;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .login_user {
            margin:20px 0;
            font-weight:bold;
            color:#2c3e50;
        }
    </style>
